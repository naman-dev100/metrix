<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Metrix Icon Generator</title>
  <style>
    body { margin: 0; display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 20px; }
    canvas { border: 1px solid #333; }
  </style>
</head>
<body>
  <h1>Metrix PWA Icons</h1>
  <canvas id="canvas"></canvas>
  <button onclick="downloadIcon()">Download Icon</button>
  
  <script>
    const sizes = [192, 512];
    
    function generateIcon(size) {
      const canvas = document.getElementById('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      
      // Background
      ctx.fillStyle = '#0a0a0a';
      ctx.fillRect(0, 0, size, size);
      
      // Purple circle background for dumbbell
      ctx.fillStyle = '#7c3aed';
      ctx.beginPath();
      ctx.arc(size/2, size/2, size*0.35, 0, Math.PI * 2);
      ctx.fill();
      
      // Draw dumbbell
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = size * 0.04;
      ctx.lineCap = 'round';
      
      // Bar
      ctx.beginPath();
      ctx.moveTo(size*0.3, size*0.5);
      ctx.lineTo(size*0.7, size*0.5);
      ctx.stroke();
      
      // Left weight
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(size*0.3, size*0.5, size*0.12, 0, Math.PI * 2);
      ctx.fill();
      
      // Right weight
      ctx.beginPath();
      ctx.arc(size*0.7, size*0.5, size*0.12, 0, Math.PI * 2);
      ctx.fill();
    }
    
    function downloadIcon() {
      const canvas = document.getElementById('canvas');
      const link = document.createElement('a');
      link.download = `icon-192x192.png`;
      link.href = canvas.toDataURL();
      link.click();
    }
    
    generateIcon(192);
  </script>
</body>
</html>
